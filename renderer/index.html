<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberShield Security Scanner</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>CyberShield Security Scanner</h1>
            <p>Automated Web Application Security Testing</p>
        </header>

        <main>
            <div class="scan-section">
                <div class="input-group">
                    <label for="url-input">Target URL:</label>
                    <input type="url" id="url-input" placeholder="https://example.com" required>
                    <button id="scan-btn">Start Scan</button>
                </div>
                
                <div id="progress-section" class="hidden">
                    <div class="progress-bar">
                        <div class="progress-fill"></div>
                    </div>
                    <p id="progress-text">Initializing scan...</p>
                </div>
            </div>

            <div class="results-section">
                <div class="results-header">
                    <h2>Scan Results</h2>
                    <button id="history-btn">View History</button>
                </div>
                <div id="results-container">
                    <div class="no-results">
                        <p>No scan results yet. Enter a URL and click "Start Scan" to begin.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- History Modal -->
    <div id="history-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Scan History</h3>
                <button id="close-modal">&times;</button>
            </div>
            <div id="history-list"></div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
